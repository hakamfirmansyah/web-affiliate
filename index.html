<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shopee Link</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #EE4D2D;
      --orange-light: #FF7337;
      --orange-dark: #C13420;
      --cream: #FFF8F5;
      --text: #1A0A06;
      --muted: #8A5A4A;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Animated background blobs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      animation: blobMove 8s ease-in-out infinite alternate;
    }
    body::before {
      width: 500px; height: 500px;
      background: var(--orange);
      top: -100px; left: -100px;
    }
    body::after {
      width: 400px; height: 400px;
      background: var(--orange-light);
      bottom: -80px; right: -80px;
      animation-delay: -4s;
    }
    @keyframes blobMove {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(30px,20px) scale(1.08); }
    }

    /* Card */
    .card {
      position: relative;
      z-index: 1;
      background: #fff;
      border-radius: 28px;
      padding: 52px 48px 44px;
      max-width: 440px;
      width: 90vw;
      box-shadow:
        0 2px 0 #f5e0d8,
        0 8px 32px rgba(238,77,45,0.10),
        0 32px 64px rgba(0,0,0,0.07);
      text-align: center;
    }

    .shopee-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 72px; height: 72px;
      background: linear-gradient(135deg, var(--orange-light), var(--orange-dark));
      border-radius: 20px;
      margin-bottom: 28px;
      box-shadow: 0 8px 24px rgba(238,77,45,0.30);
    }
    .shopee-icon svg { width: 40px; height: 40px; }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.75rem;
      font-weight: 800;
      color: var(--text);
      line-height: 1.2;
      margin-bottom: 10px;
      letter-spacing: -0.5px;
    }

    p {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 36px;
    }

    /* CTA Button */
    .btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--orange-light) 0%, var(--orange) 50%, var(--orange-dark) 100%);
      background-size: 200% 200%;
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      padding: 16px 36px;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.18s, box-shadow 0.18s, background-position 0.4s;
      box-shadow: 0 4px 20px rgba(238,77,45,0.35);
      overflow: hidden;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:hover {
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 8px 28px rgba(238,77,45,0.45);
      background-position: right center;
    }
    .btn:active { transform: scale(0.97); }

    .btn-text, .btn-icon { transition: opacity 0.2s; }

    /* Ripple effect */
    .btn .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.35);
      transform: scale(0);
      animation: rippleAnim 0.6s linear;
      pointer-events: none;
    }
    @keyframes rippleAnim {
      to { transform: scale(4); opacity: 0; }
    }

    /* ─── OVERLAY LOADING ─── */
    #overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      background: rgba(255,248,245,0.85);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    #overlay.show {
      opacity: 1;
      pointer-events: all;
    }

    /* Animated Shopee-ish cart spinner */
    .spinner-wrap {
      position: relative;
      width: 80px; height: 80px;
    }
    .spinner-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 3px solid transparent;
      animation: spin 1.1s linear infinite;
    }
    .spinner-ring:nth-child(1) {
      border-top-color: var(--orange);
      animation-duration: 1.1s;
    }
    .spinner-ring:nth-child(2) {
      inset: 8px;
      border-right-color: var(--orange-light);
      animation-duration: 0.85s;
      animation-direction: reverse;
    }
    .spinner-ring:nth-child(3) {
      inset: 18px;
      border-bottom-color: var(--orange-dark);
      animation-duration: 1.4s;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .spinner-center {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .spinner-center svg {
      width: 28px; height: 28px;
      animation: pulse 0.9s ease-in-out infinite alternate;
    }
    @keyframes pulse { from { transform: scale(0.85); opacity: 0.7; } to { transform: scale(1.1); opacity: 1; } }

    .loading-dots {
      display: flex;
      gap: 8px;
    }
    .loading-dots span {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--orange);
      animation: dotBounce 1s ease-in-out infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.15s; background: var(--orange-light); }
    .loading-dots span:nth-child(3) { animation-delay: 0.30s; background: var(--orange-dark); }
    @keyframes dotBounce {
      0%,80%,100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-10px); opacity: 1; }
    }

    .loading-text {
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--orange-dark);
      letter-spacing: 0.02em;
      animation: fadeText 2.4s ease-in-out infinite;
    }
    @keyframes fadeText {
      0%,100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    /* Progress bar */
    .progress-track {
      width: 200px;
      height: 4px;
      background: rgba(238,77,45,0.15);
      border-radius: 10px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--orange-light), var(--orange-dark));
      border-radius: 10px;
      transition: width 0.1s linear;
    }

    .small-note {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: -10px;
    }
  </style>
</head>
<body>

  <!-- Loading Overlay -->
  <div id="overlay">
    <div class="spinner-wrap">
      <div class="spinner-ring"></div>
      <div class="spinner-ring"></div>
      <div class="spinner-ring"></div>
      <div class="spinner-center">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" stroke="#EE4D2D" stroke-width="2" stroke-linejoin="round"/>
          <line x1="3" y1="6" x2="21" y2="6" stroke="#EE4D2D" stroke-width="2"/>
          <path d="M16 10a4 4 0 01-8 0" stroke="#EE4D2D" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
    </div>
    <div class="loading-dots">
      <span></span><span></span><span></span>
    </div>
    <div class="loading-text" id="loadingText">Membuka Shopee...</div>
    <div class="progress-track">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="small-note">Anda akan diarahkan ke halaman produk</div>
  </div>

  <!-- Card -->
  <div class="card">
    <div class="shopee-icon">
      <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M8 8L5 13v19a3 3 0 003 3h24a3 3 0 003-3V13L32 8H8z" fill="rgba(255,255,255,0.25)" stroke="white" stroke-width="2.2" stroke-linejoin="round"/>
        <line x1="5" y1="13" x2="35" y2="13" stroke="white" stroke-width="2.2"/>
        <path d="M26 18a6 6 0 01-12 0" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
      </svg>
    </div>

    <h1>Lihat Produk di Shopee</h1>
    <p>Klik tombol di bawah untuk membuka penawaran eksklusif langsung di Shopee.</p>

    <button class="btn" id="shopeeBtn">
      <span class="btn-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/>
          <polyline points="15 3 21 3 21 9"/>
          <line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
      </span>
      <span class="btn-text">Buka di Shopee</span>
    </button>
  </div>

  <script>
    const btn = document.getElementById('shopeeBtn');
    const overlay = document.getElementById('overlay');
    const progressBar = document.getElementById('progressBar');
    const loadingText = document.getElementById('loadingText');
    const URL = 'https://s.shopee.co.id/30lPj8OwgV';

    const messages = [
      'Membuka Shopee...',
      'Menyiapkan produk...',
      'Hampir sampai...',
      'Mengarahkan Anda...'
    ];

    btn.addEventListener('click', function (e) {
      // Ripple effect
      const ripple = document.createElement('span');
      ripple.classList.add('ripple');
      const rect = btn.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height);
      ripple.style.width = ripple.style.height = size + 'px';
      ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
      ripple.style.top  = (e.clientY - rect.top  - size / 2) + 'px';
      btn.appendChild(ripple);
      setTimeout(() => ripple.remove(), 700);

      // Show overlay
      overlay.classList.add('show');

      let progress = 0;
      let msgIndex = 0;
      const totalDuration = 2200; // ms before redirect
      const interval = 40;

      const timer = setInterval(() => {
        progress += (interval / totalDuration) * 100;
        if (progress >= 100) progress = 100;
        progressBar.style.width = progress + '%';

        const newMsgIndex = Math.floor((progress / 100) * messages.length);
        if (newMsgIndex !== msgIndex && newMsgIndex < messages.length) {
          msgIndex = newMsgIndex;
          loadingText.textContent = messages[msgIndex];
        }

        if (progress >= 100) {
          clearInterval(timer);
          setTimeout(() => {
            window.location.href = URL;
          }, 300);
        }
      }, interval);
    });
  </script>
</body>
</html>
