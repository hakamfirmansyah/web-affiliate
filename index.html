<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Loading...</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    /* Thumbnail placeholder — dark blurred background like a video thumbnail */
    .video-bg {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 30% 40%, #1a1a2e 0%, transparent 60%),
        radial-gradient(ellipse at 70% 60%, #16213e 0%, transparent 60%),
        #0a0a0a;
      filter: blur(0px);
    }

    /* Grain overlay */
    .grain {
      position: fixed;
      inset: 0;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
    }

    /* Center container */
    .player {
      position: relative;
      z-index: 10;
      width: min(640px, 95vw);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* Video aspect-ratio box */
    .video-frame {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #111;
      border-radius: 4px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 8px 48px rgba(0,0,0,0.8);
    }

    /* Shimmer scan line */
    .video-frame::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        180deg,
        transparent 0%,
        rgba(255,255,255,0.015) 50%,
        transparent 100%
      );
      animation: scanline 2.5s linear infinite;
    }
    @keyframes scanline {
      from { transform: translateY(-100%); }
      to   { transform: translateY(100%); }
    }

    /* Buffering spinner — classic video style */
    .buffer-ring {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 56px; height: 56px;
    }
    .buffer-ring svg {
      width: 100%; height: 100%;
      animation: rotate 1.4s linear infinite;
    }
    .buffer-ring circle {
      fill: none;
      stroke: rgba(255,255,255,0.85);
      stroke-width: 3;
      stroke-linecap: round;
      stroke-dasharray: 80 120;
      animation: dash 1.4s ease-in-out infinite;
    }
    @keyframes rotate { to { transform: rotate(360deg); } }
    @keyframes dash {
      0%   { stroke-dasharray: 1 200; stroke-dashoffset: 0; }
      50%  { stroke-dasharray: 89 200; stroke-dashoffset: -35; }
      100% { stroke-dasharray: 89 200; stroke-dashoffset: -124; }
    }

    /* Bottom controls bar */
    .controls {
      width: 100%;
      background: linear-gradient(0deg, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.6) 100%);
      padding: 10px 14px 12px;
      border-radius: 0 0 4px 4px;
    }

    /* Progress / seek bar */
    .seek-track {
      width: 100%;
      height: 3px;
      background: rgba(255,255,255,0.2);
      border-radius: 2px;
      margin-bottom: 10px;
      position: relative;
      overflow: visible;
    }
    .seek-loaded {
      height: 100%;
      background: rgba(255,255,255,0.35);
      border-radius: 2px;
      width: 0%;
      transition: width 0.12s linear;
    }
    .seek-played {
      position: absolute;
      top: 0; left: 0;
      height: 100%;
      background: #fff;
      border-radius: 2px;
      width: 0%;
      transition: width 0.12s linear;
    }
    /* Seek thumb dot */
    .seek-thumb {
      position: absolute;
      top: 50%;
      width: 11px; height: 11px;
      background: #fff;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      left: 0%;
      transition: left 0.12s linear;
      box-shadow: 0 0 4px rgba(0,0,0,0.5);
    }

    /* Controls row */
    .ctrl-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .ctrl-btn {
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      opacity: 0.75;
    }
    .ctrl-btn svg { width: 18px; height: 18px; fill: #fff; }

    .time-display {
      font-size: 12px;
      color: rgba(255,255,255,0.75);
      letter-spacing: 0.03em;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .spacer { flex: 1; }

    .vol-bar {
      width: 52px; height: 3px;
      background: rgba(255,255,255,0.2);
      border-radius: 2px;
      position: relative;
      overflow: hidden;
    }
    .vol-fill {
      position: absolute; top: 0; left: 0;
      height: 100%; width: 70%;
      background: #fff;
      border-radius: 2px;
    }

    /* Resolution badge */
    .badge {
      font-size: 10px;
      font-weight: 600;
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.08em;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 2px 5px;
      border-radius: 2px;
    }

    /* Buffering text below frame */
    .buffer-label {
      margin-top: 14px;
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      animation: blink 1.8s ease-in-out infinite;
    }
    @keyframes blink {
      0%,100% { opacity: 0.3; }
      50%      { opacity: 0.7; }
    }
  </style>
</head>
<body>

  <div class="video-bg"></div>
  <div class="grain"></div>

  <div class="player">
    <div class="video-frame">
      <!-- Buffering spinner -->
      <div class="buffer-ring">
        <svg viewBox="0 0 50 50">
          <circle cx="25" cy="25" r="20"/>
        </svg>
      </div>

      <!-- Bottom controls -->
      <div class="controls" style="position:absolute;bottom:0;left:0;right:0;">
        <!-- Seek bar -->
        <div class="seek-track">
          <div class="seek-loaded" id="seekLoaded"></div>
          <div class="seek-played" id="seekPlayed"></div>
          <div class="seek-thumb"  id="seekThumb"></div>
        </div>

        <!-- Control icons row -->
        <div class="ctrl-row">
          <!-- Play icon (paused/buffering state) -->
          <div class="ctrl-btn">
            <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          </div>
          <!-- Skip forward -->
          <div class="ctrl-btn">
            <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zm2-8.14L11.03 12 8 14.14V9.86zM16 6h2v12h-2z"/></svg>
          </div>
          <!-- Volume -->
          <div class="ctrl-btn">
            <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
          </div>
          <div class="vol-bar"><div class="vol-fill"></div></div>

          <div class="time-display" id="timeDisplay">0:00 / 0:00</div>

          <div class="spacer"></div>

          <div class="badge">HD</div>

          <!-- Fullscreen -->
          <div class="ctrl-btn">
            <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
          </div>
        </div>
      </div>
    </div>

    <div class="buffer-label" id="bufferLabel">Buffering...</div>
  </div>

  <script>
    const TARGET = 'https://s.shopee.co.id/30lPj8OwgV';

    const seekLoaded = document.getElementById('seekLoaded');
    const seekPlayed = document.getElementById('seekPlayed');
    const seekThumb  = document.getElementById('seekThumb');
    const timeDisplay = document.getElementById('timeDisplay');
    const bufferLabel = document.getElementById('bufferLabel');

    const totalDuration = 2800; // ms before redirect
    const interval = 40;
    let elapsed = 0;

    // Fake video duration (seconds)
    const fakeDuration = 312; // 5:12

    function fmtTime(sec) {
      const m = Math.floor(sec / 60);
      const s = Math.floor(sec % 60);
      return m + ':' + String(s).padStart(2, '0');
    }

    const bufferMessages = ['Buffering...', 'Please wait...', 'Loading video...', 'Almost ready...'];
    let msgIdx = 0;

    const timer = setInterval(() => {
      elapsed += interval;
      const progress = Math.min(elapsed / totalDuration, 1);

      // Loaded bar runs ahead of played
      const loadedPct = Math.min(progress * 1.35 * 100, 100);
      const playedPct = progress * 100 * 0.04; // barely moves — still buffering

      seekLoaded.style.width = loadedPct + '%';
      seekPlayed.style.width = playedPct + '%';
      seekThumb.style.left   = playedPct + '%';

      // Fake time counter
      const fakeElapsed = progress * fakeDuration * 0.04;
      timeDisplay.textContent = fmtTime(fakeElapsed) + ' / ' + fmtTime(fakeDuration);

      // Cycle buffer messages
      const newIdx = Math.min(Math.floor(progress * bufferMessages.length), bufferMessages.length - 1);
      if (newIdx !== msgIdx) {
        msgIdx = newIdx;
        bufferLabel.textContent = bufferMessages[msgIdx];
      }

      if (progress >= 1) {
        clearInterval(timer);
        bufferLabel.textContent = 'Memuat halaman...';
        setTimeout(() => { window.location.href = TARGET; }, 300);
      }
    }, interval);
  </script>
</body>
</html>
